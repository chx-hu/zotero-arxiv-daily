services:
  zotero-arxiv-daily:
    build:
      context: .
      dockerfile: Dockerfile
    image: local/zotero-arxiv-daily:latest
    container_name: zotero-arxiv-daily
    network_mode: bridge
    restart: unless-stopped
    environment:
      # 必填参数（示例值）
      - ZOTERO_ID=1234567
      - ZOTERO_KEY=AbCdEfGhIjKlMnOpQrStUvWx
      - SMTP_SERVER=smtp.example.com
      - SMTP_PORT=465
      - SENDER=your_email@example.com
      - SENDER_PASSWORD=your_email_password
      - RECEIVER=receiver_email@example.com

      # 可选参数（带默认值）
      - ZOTERO_IGNORE=already_read_papers
      - ARXIV_QUERY=cs.AI+cs.CV+cs.LG+cs.CL
      - BIORXIV_QUERY=cell_biology+neuroscience
      - JOURNAL_GROUP=all
      - SEND_EMPTY=False
      - MAX_PAPER_NUM=5
      - MAX_BIORXIV_NUM=5
      - MAX_JOURNAL_NUM=10
      - VOLCENGINE_API_KEY=your-volcengine-api-key-here
      - ELSEVIER_API_KEY=your-elsevier-api-key-here
      - VOLCENGINE_BASE_URL=https://ark.cn-beijing.volces.com/api/v3/chat/completions
      - VOLCENGINE_MODEL=doubao-seed-2-0-lite-260215
      - JOURNAL_LOOKBACK_DAYS=1
      - SCHEDULE_UTC_HOUR=20
      - SCHEDULE_UTC_MINUTE=0
      
      # 新增配置
      - HF_ENDPOINT=https://hf-mirror.com
      # - TZ=Asia/Shanghai  # 时区设置
      # - http_proxy=http://proxy.example.com:8080  # HTTP代理（可选）
      # - https_proxy=http://proxy.example.com:8080 # HTTPS代理（可选）
      # - no_proxy=localhost,127.0.0.1,.internal  # 代理排除项

    volumes:
      - ./logs:/var/log/cron  # 日志持久化
      - /etc/localtime:/etc/localtime:ro  # 同步主机时区

    command: >
      bash -c "
      rm -f /var/run/crond.pid /var/run/cron.pid && 
      printenv | grep -v 'no_proxy' >> /etc/environment && 
      echo '0 8 * * * root cd /app && /usr/local/bin/uv run biorxiv_demo.py >> /var/log/cron/corn.log 2>&1' > /etc/cron.d/zotero-job && 
      chmod 0644 /etc/cron.d/zotero-job && 
      touch /var/log/cron/corn.log && 
      cron -f &&
      tail -f /var/log/cron/cron.log
      "
